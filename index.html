<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>simple calculator</title>

<link rel="stylesheet" href="style.css"
</head>
<body>
    <div class="container">
        <h2 class="title">Simple calculator</h2>

        <table border="2" cellpading = "10">
         <!-- 1st -->
     <tr>
     <td colspan="4"><input type="text" placeholder="0"></td>   
     </tr>
        
     <!-- 2nd -->
     <tr>

        <td>7</td>
        <td>8</td>
        <td>9</td>
        <td>/</td>

     </tr>

     <!-- 3rd -->

     <tr>

        <td>4</td>
        <td>5</td>
        <td>6</td>
        <td>*</td>

     </tr>

     <!-- 4th -->

     <tr>

        <td>1</td>
        <td>2</td>
        <td>3</td>
        <td>-</td>

     </tr>

     <!-- 5th -->

     <tr>

        <td>0</td>
        <td>.</td>
        <td>=</td>
        <td>+</td>

     </tr>
        </table>



    </div>
</body>
</html>
